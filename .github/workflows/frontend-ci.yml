name: Frontend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Run all steps inside the frontend directory
    defaults:
      run:
        working-directory: ./frontend/asset-track-management-system

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Using current LTS
        cache: 'npm'
        cache-dependency-path: './frontend/asset-track-management-system/package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Build React App
      run: npm run build

    # Run tests (disabled for now)
    # - name: Run tests
    #   run: npm test -- --watchAll=false
