spring.application.name=asset-track-management-API

# ── PostgreSQL Database Connection ────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:6543/postgres?sslmode=require
spring.datasource.username=postgres.rdpijevzzafhzoajvfcz
spring.datasource.password=AssetTrack2_Postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Hibernate Configuration ───────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# ── JWT ───────────────────────────────────────────────────────────────────────
# Secret must be at least 256 bits (32 chars) for HS256.
# Change this value before deploying to any non-local environment.
app.jwt.secret=AssetTrackSuperSecretKey_ChangeMe_32chars!
app.jwt.expiry-ms=86400000

# ── Alert Scheduler Configuration ────────────────────────────────────────────
# Number of days before warranty expiry that a WARRANTY_EXPIRING alert is raised.
assettrack.alerts.warranty-lead-days=30
# Minimum number of AVAILABLE units per asset type before a LOW_STOCK alert fires.
assettrack.alerts.low-stock-threshold=5
# Notification email address (alerts are also sent here via SMTP)
assettrack.alerts.notification-email=admin@example.com

# ── SMTP (configure for Mailtrap or MailHog during development) ───────────────
# Mailtrap example — replace with your own Mailtrap inbox credentials:
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=your_mailtrap_username
spring.mail.password=your_mailtrap_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# MailHog alternative (no auth needed, listens on localhost:1025):
# spring.mail.host=localhost
# spring.mail.port=1025
# spring.mail.properties.mail.smtp.auth=false
# spring.mail.properties.mail.smtp.starttls.enable=false