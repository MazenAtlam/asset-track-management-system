
# ──────────────────────────────────────────────────────────────────────
# Test-only configuration — overrides src/main/resources/application.properties
# Uses an in-memory H2 database so tests run without a live PostgreSQL server.
# ──────────────────────────────────────────────────────────────────────

spring.application.name=asset-track-management-API

# H2 In-Memory Database (PostgreSQL compatibility mode)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Hibernate — recreate schema from scratch on every test run
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# ── JWT (required by JwtUtil) ─────────────────────────────────────────
app.jwt.secret=TestOnlySecretKey_MustBeAtLeast32Chars!
app.jwt.expiry-ms=86400000

# ── Alert Scheduler (required by NotificationService) ─────────────────
assettrack.alerts.warranty-lead-days=30
assettrack.alerts.low-stock-threshold=5
assettrack.alerts.notification-email=test@example.com

# ── SMTP (disabled for tests — use a no-op or dummy config) ───────────
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false